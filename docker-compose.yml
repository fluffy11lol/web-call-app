services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50050:50000-50050/udp"
    environment:
      LIVEKIT_KEYS: "devkey: secret_key_123"
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379" 